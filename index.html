<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STEM Community College Finder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🎓 STEM College Finder</h1>
  <p>Find the best US community college for you</p>
</header>

<div class="controls">
  <select id="filter-cost">
    <option value="all">All Costs</option>
    <option value="low">Low Living Cost</option>
    <option value="high">High Indian Community</option>
  </select>

  <input type="text" id="search" placeholder="Search state...">
</div>

<div id="cards"></div>

<script src="script.js"></script>
</body>
</html>
